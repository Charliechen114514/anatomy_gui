name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: MkDocs strict build
        run: mkdocs build --clean --strict
