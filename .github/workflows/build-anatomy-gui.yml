name: Build Anatomy GUI Tutorials

on:
  push:
    branches: [main]
    paths:
      - 'src/tutorial/anatomy_gui_for_tutorials/**'
      - 'src/tutorial/build_anatomy_gui_for_tutorials.py'
      - '.github/workflows/build-anatomy-gui.yml'
  pull_request:
    paths:
      - 'src/tutorial/anatomy_gui_for_tutorials/**'
      - 'src/tutorial/build_anatomy_gui_for_tutorials.py'
  workflow_dispatch:

jobs:
  build-anatomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libxcb1-dev libcairo2-dev

      - name: Build all anatomy stages
        run: >
          python src/tutorial/build_anatomy_gui_for_tutorials.py
          --target anatomy-stage1
          --target anatomy-stage2
          --target anatomy-stage3
